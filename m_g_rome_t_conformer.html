<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dual Molecular Viewer</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      width: 100%;
      max-width: 1400px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .viewers {
      display: flex;
      flex-wrap: nowrap;
      justify-content: center;
      gap: 20px;
      width: 100%;
    }
    .jmol-wrapper {
      width: 75%;
      aspect-ratio: 1 / 1;
      border: 2px solid #0077cc;
      background-color: #fff;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      width: 100%;
      margin-top: 20px;
    }
    select, button {
      padding: 10px 15px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 5px;
      background-color: #ffffff;
      cursor: pointer;
      transition: background-color 0.3s ease;
      flex: 1 1 150px;
      max-width: 200px;
    }
    button:hover, select:hover {
      background-color: #e6f0ff;
    }
    label {
      font-weight: bold;
      flex-basis: 100%;
      text-align: center;
    }
    @media (max-width: 500px) {
      select, button {
        font-size: 13px;
        padding: 8px 12px;
      }
    }
  </style>
  <script type="text/javascript" src="jsmol/JSmol.min.js"></script>
  <script type="text/javascript">
    var myJmol = "myJmol";

    jmol_isReady = function (applet) {
      document.title = "Jmol Viewer";
    };

    const style_script = `
      background white;
      set axes off;
      set perspectiveDepth off;
      wireframe off;
      spacefill off;

      # representación base
      select all;
      wireframe 0.05;
      color cpk;

      # MAN (65–90 en VMD → 66–91 en Jmol)
      select atomno >=66 and atomno <=91;
      wireframe 0.12;
      spacefill 0.28;
      color [0,150,255];


      # GLC (45–64 23 → 46–65 24)
      select (atomno >=46 and atomno <=65) or atomno=24;
      wireframe 0.06;
      color yellow;

      # RAP (0–22 → 1–23)
      select atomno >=1 and atomno <=23;
      wireframe 0.06;
      color red;

      # TAL (24–44 → 25–45)
      select atomno >=25 and atomno <=45;
      wireframe 0.06;
      color green;
    
      
      # H y O más pequeños
      select oxygen;
      spacefill 0.32;
      wireframe 0.08;
      color red;

      select hydrogen;
      spacefill 0.18;
      wireframe 0.05;
      color white;

      # recalcular conectividad
      connect delete;
      connect auto;

      # H bonds
      set hbondsAngleMinimum 60;
      set hbondsDistanceMaximum 3.0;
      calculate hbonds;
      color hbonds black;
      set hbondsSolid false;
      hbonds 0.25;
    `;

    var Info = {
      width: "100%",
      height: "100%",
      color: "#ffffff",
      use: "HTML5",
      j2sPath: "jsmol/j2s",
      script: `load "mol/M_G_ROMe_deoT_crest_clustered.xyz"; ${style_script}`,
      readyFunction: jmol_isReady,
      disableJ2SLoadMonitor: true,
    };

    document.addEventListener("DOMContentLoaded", function () {
      document.getElementById("jmol_div1").innerHTML = Jmol.getAppletHtml(myJmol, Info);
    });


  </script>
</head>
<body>
  <div class="container">

    <!-- Title -->
    <div class="viewers">
      <h1>Initial M_G_ROMe_deoT CONFORMERS</h1>
    </div>

    <!-- Viewer -->
    <div class="viewers">
      <div class="jmol-wrapper" id="jmol_div1"></div>
    </div>
  </div>
</body>
</html>
